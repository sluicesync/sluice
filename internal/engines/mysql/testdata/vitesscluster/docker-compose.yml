# Minimal full Vitess cluster for ADR-0073 (c) cutover-survival tests.
#
# Unlike vttestserver (single vtcombo container, scheduler stubbed), this
# is a REAL cluster — etcd + vtctld + a primary + a replica vttablet
# (each with its own MySQL) + vtgate — so the online-DDL scheduler runs
# the genuine VReplication copy + atomic rename cutover that vtcombo
# can't. See startVitessCluster in cdc_vstream_cluster_integration_test.go.
#
# Image is pinned to vitess/lite:v24.0.1 — Vitess 24 — to match the
# vendored vitess.io/vitess v0.24.1 client (the Go module v0.X maps to the
# Vitess MAJOR release: v0.24.x == Vitess 24.0.x). Keep this image MAJOR
# in lockstep with the vendored client: a multi-major skew exercises a
# different online-DDL / `_vt_*` lifecycle than the code under test and is
# not the real baseline (real PlanetScale runs current-major Vitess too).
#
# Flag conventions are pinned to Vitess 24: the server binaries and
# vtctldclient all take HYPHENATED flags (--service-map,
# --topo-implementation, --init-tablet-type, --tablet-uid, --mysql-port).
# (Vitess 20 accepted underscore flags; v24 deprecates them — they still
# alias but emit deprecation warnings, so we use the canonical hyphen
# form.) The binaries live in /vt/bin, which IS already on the v24 image's
# default PATH (VTROOT=/vt), so no PATH prelude is needed. The shard's
# first primary is elected with `PlannedReparentShard` — `InitShardPrimary`
# was REMOVED in Vitess 24.
#
# Host ports are env-substitutable so a second stack (or CI) can avoid
# clashes; they default to the values the Go harness expects.

name: ${COMPOSE_PROJECT:-sluice-vitesscluster}

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    command:
      - etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 3s
      timeout: 3s
      retries: 40

  vtctld:
    image: vitess/lite:v24.0.1
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        vtctldclient --server internal --topo-implementation etcd2 --topo-global-server-address etcd:2379 --topo-global-root /vitess/global AddCellInfo --root /vitess/zone1 --server-address etcd:2379 zone1 || true
        exec vtctld \
          --topo-implementation etcd2 --topo-global-server-address etcd:2379 --topo-global-root /vitess/global \
          --cell zone1 \
          --service-map 'grpc-vtctl,grpc-vtctld' \
          --port 15000 --grpc-port 15999 \
          --config-file-not-found-handling=ignore
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "/vt/bin/vtctldclient --server localhost:15999 GetKeyspaces || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 40

  vttablet:
    image: vitess/lite:v24.0.1
    hostname: vttablet
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /vt/vtdataroot
        mysqlctl --tablet-uid 100 --mysql-port 17000 init || mysqlctl --tablet-uid 100 --mysql-port 17000 start
        exec vttablet \
          --topo-implementation etcd2 --topo-global-server-address etcd:2379 --topo-global-root /vitess/global \
          --tablet-path zone1-0000000100 \
          --tablet-hostname vttablet \
          --init-keyspace test \
          --init-shard 0 \
          --init-tablet-type replica \
          --mysql-server-version '8.0.40-Vitess' \
          --health-check-interval 5s \
          --port 15100 --grpc-port 16100 \
          --service-map 'grpc-queryservice,grpc-tabletmanager,grpc-updatestream' \
          --heartbeat-on-demand-duration=5s \
          --config-file-not-found-handling=ignore
    depends_on:
      vtctld:
        condition: service_healthy

  vttablet-replica:
    image: vitess/lite:v24.0.1
    hostname: vttablet-replica
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /vt/vtdataroot
        mysqlctl --tablet-uid 101 --mysql-port 17000 init || mysqlctl --tablet-uid 101 --mysql-port 17000 start
        exec vttablet \
          --topo-implementation etcd2 --topo-global-server-address etcd:2379 --topo-global-root /vitess/global \
          --tablet-path zone1-0000000101 \
          --tablet-hostname vttablet-replica \
          --init-keyspace test \
          --init-shard 0 \
          --init-tablet-type replica \
          --mysql-server-version '8.0.40-Vitess' \
          --health-check-interval 5s \
          --port 15100 --grpc-port 16100 \
          --service-map 'grpc-queryservice,grpc-tabletmanager,grpc-updatestream' \
          --heartbeat-on-demand-duration=5s \
          --config-file-not-found-handling=ignore
    depends_on:
      vtctld:
        condition: service_healthy

  init:
    image: vitess/lite:v24.0.1
    entrypoint: ["sh", "-c"]
    command:
      - |
        VTCTLD="vtctldclient --server vtctld:15999"
        echo "waiting for both tablets to register..."
        for i in $$(seq 1 90); do
          n=$$($$VTCTLD GetTablets --keyspace test 2>/dev/null | grep -c zone1-)
          if [ "$$n" -ge 2 ]; then break; fi
          sleep 2
        done
        echo "promoting primary (uid 100) via PlannedReparentShard..."
        $$VTCTLD PlannedReparentShard test/0 --new-primary zone1-0000000100
        echo "waiting for a serving primary and replica..."
        for i in $$(seq 1 90); do
          out=$$($$VTCTLD GetTablets --keyspace test 2>/dev/null)
          if echo "$$out" | grep -q "primary" && echo "$$out" | grep -q "replica"; then break; fi
          sleep 2
        done
        echo "init done."
        $$VTCTLD GetTablets --keyspace test
    depends_on:
      vttablet:
        condition: service_started
      vttablet-replica:
        condition: service_started
      vtctld:
        condition: service_healthy

  vtgate:
    image: vitess/lite:v24.0.1
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        exec vtgate \
          --topo-implementation etcd2 --topo-global-server-address etcd:2379 --topo-global-root /vitess/global \
          --port 15001 --grpc-port 15991 --mysql-server-port 15306 \
          --cell zone1 --cells-to-watch zone1 \
          --tablet-types-to-wait PRIMARY \
          --service-map 'grpc-vtgateservice' \
          --mysql-auth-server-impl none \
          --mysql-server-version '8.0.40-Vitess' \
          --config-file-not-found-handling=ignore
    ports:
      - "${VTGATE_MYSQL_PORT:-15306}:15306"
      - "${VTGATE_GRPC_PORT:-15991}:15991"
    depends_on:
      vtctld:
        condition: service_healthy
