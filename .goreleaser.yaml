# GoReleaser configuration for sluice.
# Docs: https://goreleaser.com

version: 2

project_name: sluice

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: sluice
    main: ./cmd/sluice
    binary: sluice
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: sluice
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - docs/*

checksum:
  name_template: checksums.txt

# Multi-arch runtime container image (linux/amd64 + linux/arm64) published
# to GHCR. The Dockerfile only COPYs the pre-built static binary, so each
# per-arch build is a trivial layer — buildx + QEMU handle the arm64 one.
dockers:
  - id: sluice-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/sluicesync/sluice:{{ .Version }}-amd64"
      - "ghcr.io/sluicesync/sluice:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=sluice"
      - "--label=org.opencontainers.image.description=Open-source MySQL <-> Postgres CDC migration and continuous-sync tool"
      - "--label=org.opencontainers.image.source=https://github.com/sluicesync/sluice"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: sluice-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/sluicesync/sluice:{{ .Version }}-arm64"
      - "ghcr.io/sluicesync/sluice:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=sluice"
      - "--label=org.opencontainers.image.description=Open-source MySQL <-> Postgres CDC migration and continuous-sync tool"
      - "--label=org.opencontainers.image.source=https://github.com/sluicesync/sluice"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

# Combine the per-arch images into a single multi-arch manifest per tag.
docker_manifests:
  - name_template: "ghcr.io/sluicesync/sluice:{{ .Version }}"
    image_templates:
      - "ghcr.io/sluicesync/sluice:{{ .Version }}-amd64"
      - "ghcr.io/sluicesync/sluice:{{ .Version }}-arm64"
  - name_template: "ghcr.io/sluicesync/sluice:latest"
    image_templates:
      - "ghcr.io/sluicesync/sluice:latest-amd64"
      - "ghcr.io/sluicesync/sluice:latest-arm64"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: sluicesync
    name: sluice
  draft: true
  prerelease: auto
  header: |
    ## sluice {{ .Version }}

    See the [changelog](https://github.com/sluicesync/sluice/blob/main/CHANGELOG.md) for highlights.

    During the v0.x series, no API or CLI stability guarantees are made. See the README for details.

# ---------------------------------------------------------------------------
# Package-manager distribution.
#
# brews / scoops / winget each commit a formula/manifest into a SEPARATE repo,
# so they need a cross-repo token: TAP_GITHUB_TOKEN, a fine-grained PAT with
# contents:write on sluicesync/{homebrew-tap, scoop-bucket, winget-pkgs},
# wired into release.yml's goreleaser step env. nfpms only attaches native
# packages to the GitHub release and rides the default GITHUB_TOKEN.
# ---------------------------------------------------------------------------

# Native Linux packages (.deb / .rpm / .apk) attached to each release.
# Install: `sudo dpkg -i sluice_*_amd64.deb` (Debian/Ubuntu) or
# `sudo rpm -i sluice_*_x86_64.rpm` (RHEL/Fedora). A hosted apt/dnf repo
# (`apt install sluice`) is a future follow-up (needs hosting + GPG signing).
nfpms:
  - id: sluice
    package_name: sluice
    vendor: sluicesync
    homepage: "https://sluicesync.com"
    maintainer: "sluicesync <hello@sluicesync.com>"
    description: "Open-source MySQL <-> Postgres database migration and continuous-sync (CDC) tool"
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/sluice/LICENSE
      - src: README.md
        dst: /usr/share/doc/sluice/README.md

# Homebrew formula -> sluicesync/homebrew-tap. `brew install sluicesync/tap/sluice`
brews:
  - name: sluice
    repository:
      owner: sluicesync
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://sluicesync.com"
    description: "Open-source MySQL <-> Postgres database migration and continuous-sync (CDC) tool"
    license: Apache-2.0
    commit_author:
      name: sluicesync-bot
      email: hello@sluicesync.com
    install: |
      bin.install "sluice"
    test: |
      system "#{bin}/sluice", "--version"

# Scoop manifest -> sluicesync/scoop-bucket.
# `scoop bucket add sluicesync https://github.com/sluicesync/scoop-bucket; scoop install sluice`
scoops:
  - repository:
      owner: sluicesync
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://sluicesync.com"
    description: "Open-source MySQL <-> Postgres database migration and continuous-sync (CDC) tool"
    license: Apache-2.0
    commit_author:
      name: sluicesync-bot
      email: hello@sluicesync.com

# WinGet manifest -> committed to the sluicesync/winget-pkgs fork, then a PR is
# opened to microsoft/winget-pkgs (community validation + review per version).
# Install (once accepted upstream): `winget install sluicesync.sluice`
winget:
  - name: sluice
    # winget is submitted MANUALLY and SELECTIVELY (microsoft/winget-pkgs reviews
    # every version, and slowly), so the release must NOT auto-push it. Beyond the
    # intent, the auto-push to the sluicesync/winget-pkgs fork intermittently fails
    # on GitHub API flakiness (a 500, then a 403 "Timed out validating rule", e.g.
    # v0.99.187) which would otherwise FAIL the whole release AFTER the binaries +
    # GHCR image + homebrew + scoop have already published. skip_upload generates
    # the manifest (it lands in dist/winget/ for a manual fork PR when a version
    # warrants one) but never pushes it, so winget can never block a release. Set
    # to "false" to re-enable the auto fork-push.
    skip_upload: "true"
    publisher: sluicesync
    publisher_url: "https://sluicesync.com"
    package_identifier: sluicesync.sluice
    short_description: "Open-source MySQL <-> Postgres database migration and continuous-sync (CDC) tool"
    description: "sluice is an open-source database migration and continuous-sync (CDC) tool covering MySQL and Postgres in all four directions."
    license: Apache-2.0
    license_url: "https://github.com/sluicesync/sluice/blob/main/LICENSE"
    copyright: sluicesync
    homepage: "https://sluicesync.com"
    release_notes_url: "https://github.com/sluicesync/sluice/releases/tag/{{ .Tag }}"
    tags:
      - database
      - migration
      - cdc
      - mysql
      - postgres
    commit_author:
      name: sluicesync-bot
      email: hello@sluicesync.com
    repository:
      owner: sluicesync
      name: winget-pkgs
      branch: "sluice-{{ .Version }}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      # Auto-PR to microsoft/winget-pkgs is intentionally OFF. A fine-grained
      # PAT can only act on repos in its scope, so it cannot open a PR against
      # microsoft/winget-pkgs (out of scope) — that step failed the first
      # v0.99.2 release attempt even though the manifest pushed to our fork
      # cleanly. GoReleaser still commits the manifest to the
      # sluicesync/winget-pkgs fork branch; open the upstream PR manually
      # (microsoft reviews every version anyway). To re-enable auto-PR, swap in
      # a classic PAT with the public_repo scope.
      pull_request:
        enabled: false
