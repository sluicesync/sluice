# Continuous Integration workflow.
#
# Runs on every push to main and every pull request targeting main.
# The jobs run in parallel:
#   - test:        unit tests (Linux on push/PR; full Linux+Windows matrix on tag push or manual dispatch)
#   - integration: testcontainers-backed end-to-end tests on Linux, sharded by
#                  package/test-name and rolled up into one required check named
#                  `Integration`; the heavier postgis / vstream suites run as
#                  their own required jobs
#   - lint:        golangci-lint + the tags-vet matrix + the shard-coverage guard
#   - govulncheck: reachability-based vulnerability scan (non-required)
#   - build:       smoke-test that ./cmd/sluice still compiles (Linux on push/PR; full matrix on tag/dispatch)
#
# Cost-shape (v0.20.1): macOS runners cost ~10× Linux per minute and
# Windows runners cost ~1.7× Linux. Previously this workflow ran a
# 3-OS matrix on tag pushes and workflow_dispatch; macOS was the
# largest cost driver per tag-push (a $14-18/day total in May 2026
# under heavy autonomous-release activity), and `go build` smoke-tests
# on macOS rarely caught anything Linux+Windows didn't. Dropped macOS
# from the matrix entirely — Linux + Windows give cross-platform
# coverage that matches the user-installed-binary audience for sluice
# (server deployments + Windows operators); macOS binaries still ship
# from GoReleaser without a CI test pass.
#
# `paths-ignore` skips this workflow for docs-only branch pushes /
# pull-requests (markdown, design docs, tmp release-notes staging).
# Tag pushes are NOT affected by paths-ignore (GitHub Actions ignores
# path filters for tag events) — Release + CI always run on tags
# regardless of whether the tagged commit is docs-only, so v0.17.3 /
# v0.18.0-style tags pointing at CHANGELOG-only commits still trigger
# the full release pipeline. This keeps the publish gate's CI
# requirement satisfiable on every tag.
#
# To trigger the full matrix manually from the GitHub UI: Actions tab →
# CI workflow → "Run workflow" button → pick branch → click. The
# workflow runs with the full Linux+Windows matrix on the chosen branch.
#
# A failed job blocks merges if branch protection is enabled (see
# docs/dev/branch-protection.md for setup).

name: CI

# Triggers:
#   - push to main: routine post-merge verification (Linux-only matrix; skipped for docs-only diffs)
#   - pull_request to main: PR review check (Linux-only matrix; skipped for docs-only diffs)
#   - push of tags v*: release verification (Linux+Windows matrix; paths-ignore does NOT apply to tag pushes)
#   - workflow_dispatch: manual on-demand run from GitHub UI (Linux+Windows matrix)
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "tmp/**"
      - ".gitignore"
      - "LICENSE"
      - ".githooks/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "tmp/**"
      - ".gitignore"
      - "LICENSE"
      - ".githooks/**"
  workflow_dispatch: {}

# Default token permissions — least-privilege. Workflows that need to
# write must opt in explicitly. CI here is read-only.
permissions:
  contents: read

# Cancel in-progress runs for the same ref when a new commit lands. Saves
# CI minutes and ensures the latest commit's result is the one that
# matters. Without this, fast-pushing a fix would queue up duplicate runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Force every `run` step onto bash so argument parsing is identical on
# Linux, macOS, and Windows. PowerShell (the Windows default) splits
# arguments differently and broke `go test -coverprofile=coverage.out`
# by treating `coverage.out` as `coverage` plus a `.out` positional
# package argument. Bash is preinstalled on all GitHub-hosted runners.
defaults:
  run:
    shell: bash

jobs:
  # ----- Test -----
  # Runs `go test` with the race detector. The matrix shape depends on
  # the trigger:
  #   - tag push (v*) or workflow_dispatch: full Linux+Windows matrix for
  #     release verification or operator-explicit cross-platform check.
  #   - push to main / pull_request: Linux-only for routine verification.
  # The conditional matrix is built via fromJSON because GitHub Actions
  # matrix expressions can't directly reference event context — the
  # JSON literal is selected at workflow-parse time then expanded.
  # fail-fast: false means all combinations finish even if one fails
  # (so we see the full picture of which platforms broke).
  test:
    name: Test (${{ matrix.os }})
    # Explicit cap so a wedged step can't run to GitHub's 6-hour
    # default. The unit suite + vet take ~5-8m; generous headroom.
    timeout-minutes: 20
    # Self-hosted-runner selector. vars.CI_LINUX_RUNNER /
    # CI_WINDOWS_RUNNER unset => ubuntu-latest / windows-latest
    # (identical to pre-selector behaviour). Set a repo variable to
    # a self-hosted runner label to route there; unset to fall back
    # (GitHub does NOT auto-fail-over an offline self-hosted runner —
    # the variable IS the manual fail-back lever). Runner provisioning
    # lives in the private sluicesync/sluice-ops repo (self-hosted-runner.md).
    runs-on: ${{ (matrix.os == 'windows-latest' && (vars.CI_WINDOWS_RUNNER || 'windows-latest')) || (vars.CI_LINUX_RUNNER || 'ubuntu-latest') }}
    strategy:
      fail-fast: false
      matrix:
        # Linux-only on routine push/PR; Linux+Windows on tag/dispatch.
        # macOS dropped in v0.20.1 — see workflow-header cost-shape note.
        os: ${{ fromJSON((github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && '["ubuntu-latest","windows-latest"]' || '["ubuntu-latest"]') }}
    steps:
      # Checkout the code into the runner's working directory.
      - uses: actions/checkout@v7

      # Install Go and enable the module cache so subsequent runs reuse
      # downloaded dependencies. setup-go@v6 enables caching by default.
      # `go-version-file` reads the version from go.mod so CI tracks the
      # declared toolchain automatically — bumping go.mod is the only
      # place a Go upgrade has to land.
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      # Download modules first so any failure here is isolated from the
      # build/test step (easier triage in the CI logs).
      - run: go mod download

      # `go vet` is the cheap-and-fast static checker baked into the Go
      # toolchain. It catches a lot of real bugs (printf format mismatches,
      # struct tag typos, copying mutexes) and runs in seconds.
      - run: go vet ./...

      # Tests with the race detector enabled on Linux. -count=1 disables
      # the test cache so we always get a fresh run.
      #
      # -race is Linux-only by design (the flag is gated on the
      # ubuntu-latest matrix entry; Windows runs the same suite without
      # it). A data race is a property of the program's OS-independent
      # synchronization under Go's single cross-platform memory model —
      # the same unit suite already runs under -race on the ubuntu
      # entry, and the concurrency-heavy surface (the integration suite)
      # is Linux-only anyway, so a Windows -race pass of the unit suite
      # is redundant. It is also unrunnable on the self-hosted Windows
      # runner (CGO_ENABLED=0, no gcc; -race needs the CGO/TSan runtime).
      # Linux stays the authoritative -race gate (see CLAUDE.md
      # "Concurrency chunks"); Windows still contributes compile +
      # Windows-specific behavior coverage via the un-raced `go test`
      # here and the build job below.
      #
      # Coverage is scoped to ./internal/... — the directories that
      # actually have test files. cmd/sluice is a `package main` with
      # no tests; including it in -coverprofile triggers a Go 1.25
      # coverage code path that wants the `covdata` tool, which is not
      # always present in setup-go's install layout. cmd/sluice still
      # gets compile-checked by `go vet ./...` above and by the build
      # job below, so coverage of zero is the right answer for it.
      - run: go test ${{ matrix.os == 'ubuntu-latest' && '-race' || '' }} -count=1 -coverprofile=coverage.out ./internal/...
      - run: go test ${{ matrix.os == 'ubuntu-latest' && '-race' || '' }} -count=1 ./cmd/...

      # Upload coverage from the Linux run only (otherwise we'd get three
      # near-identical artifacts). Useful for inspecting coverage trends.
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  # ----- Integration -----
  # Integration tests are gated behind the `integration` build tag because
  # they require Docker (testcontainers-go boots real MySQL and Postgres
  # instances). GitHub-hosted ubuntu runners ship with Docker preinstalled,
  # so this job runs the same `go test -tags=integration` invocation that
  # contributors run locally — proving the simple-mode and cross-engine
  # migration paths on every PR without anyone having to remember.
  #
  # Linux-only: Docker isn't preinstalled on the macOS or Windows runners
  # the project tests against, and our deployment targets are server
  # platforms anyway. The cross-OS Test job above already covers OS-
  # specific compile and test concerns for the unit suite.
  integration:
    name: Integration (${{ matrix.shard.name }})
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    # Disable the testcontainers ryuk reaper in CI. CI runners are
    # ephemeral (the VM is discarded after the job, so there are no orphan
    # containers to reap) and the tests already self-clean via
    # `defer cleanup()`, so ryuk is pure overhead here — and keeping it on
    # added a docker.io pull of testcontainers/ryuk that intermittently
    # timed out and red-failed a shard ("registry-1.docker.io ... context
    # deadline exceeded"). Scoped to CI only: local Linux/macOS dev keeps
    # ryuk (its orphan-reaping helps after a Ctrl-C/panic before defer
    # runs); Windows/Rancher already disables it locally. See
    # docs/dev/development.md.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    # Need packages:read so the pre-baked images on ghcr.io
    # (ghcr.io/sluicesync/sluice-mysql:8.0-prebaked etc., task #68) can be
    # pulled by `docker pull` below. Default token permissions are
    # read-only (see workflow-level `permissions:` block) but don't
    # include `packages:` — opt in here.
    permissions:
      contents: read
      packages: read
    # 45m outer envelope. Was 60m through v0.28.0 (job also ran the
    # additive postgis-tagged suite); v0.29.0 split postgis into its
    # own parallel job and it dropped to 35m. v0.68.0: the integration
    # suite grew organically (ADR-0046 inline-rotation crash-injection
    # matrix ×5 FSM edges + 8-segment zero-loss + the full backup/
    # restore surface, then ADR-0047 verbatim passthrough) to ~at the
    # 25m inner go-test timeout by v0.67.1; bumped to 45m outer / 35m
    # inner for durable headroom (kept go-test-timeout < timeout-minutes
    # so Go's diagnostic timeout-panic fires before any hard job kill).
    #
    # Both budgets are variable-driven: GitHub-hosted keeps the tuned
    # 45/35 (fast feedback; surfaces real perf regressions), while a
    # slower self-hosted runner can be given a larger envelope WITHOUT
    # a code change by setting CI_INTEGRATION_JOB_TIMEOUT (outer, minutes)
    # and CI_INTEGRATION_TIMEOUT (inner, go-test duration). INVARIANT:
    # inner < outer (keep the diagnostic-panic-before-hard-kill margin)
    # — when raising for self-hosted, set them together (e.g. 90 / 75m).
    timeout-minutes: ${{ fromJSON(vars.CI_INTEGRATION_JOB_TIMEOUT || '45') }}
    # Matrix-shard the integration suite by package + by test-name
    # within the dominant internal/pipeline package (228+ test
    # functions vs 18 mysql + 14 postgres files; `TestMigrate_` alone
    # is 106 — 46% of pipeline). On the self-hosted fleet (4 runners)
    # the shards run in parallel → wall time drops dramatically from
    # the pre-shard ~39m monolith.
    #
    # v0.72.3 rebalance: the original `pipeline-rest` shard
    # accumulated weight through v0.72.0–v0.72.2 (Shape A Bug 80/81/82
    # e2e pins, AIMD streamer test, ADR-0046 backup-chain crash-
    # injection matrix, ADR-0049 schema-history machinery, the corpus
    # harness) and became the long pole at ~40–45m vs pipeline-migrate's
    # ~18-20m. Splitting on the TestStreamer_ prefix (32 of the 92
    # non-migrate test functions; heavier per-test because CDC streams
    # are long-lived) gives a ~50/50 wall-time split. The 5-shard
    # layout briefly queues on the 4-runner fleet but the wall-time
    # win still nets positive (~30%).
    #
    # `pipeline-migrate` + `pipeline-rest-streamer` + `pipeline-rest-other`
    # exactly partition the pipeline package: their -run/-skip regexes
    # are mutually exclusive AND cover every test (a function either
    # starts with TestMigrate_, starts with TestStreamer_, or neither).
    # Zero overlap; zero gap. Go 1.20+ required for `-skip`; go.mod
    # pins >= 1.26.
    #
    # `engines-postgres-and-rest` also bundles the pgtrigger engine
    # and the small non-pipeline / non-mysql-engine packages (ir,
    # translate, redact, crypto, config). The package list below is
    # HAND-MAINTAINED — it does NOT automatically pick up new
    # packages (the pgtrigger engine landed 2026-05-27 and sat
    # outside every shard until 2026-06-10, untested in CI). The
    # `check integration shard coverage` step in the Lint job
    # (scripts/check-shard-coverage.sh) fails CI when a package with
    # integration-tagged tests is missing from this list, so the
    # list can no longer rot silently.
    #
    # The rollup job below (`integration-summary`, name: Integration)
    # preserves the existing required-status-check name so branch
    # protection on `main` does NOT need to be updated; `needs:
    # integration` automatically depends on every matrix entry, so
    # adding a 5th shard required zero rollup change.
    #
    # The 45m/35m budget rationale above still applies PER SHARD;
    # each shard runs less work than the old monolith so headroom is
    # more generous than strictly needed. Variable-driven knobs
    # unchanged.
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: pipeline-migrate
            packages: "./internal/pipeline/"
            goflags: "-run ^TestMigrate_"
          - name: pipeline-rest-streamer
            packages: "./internal/pipeline/"
            goflags: "-run ^TestStreamer_"
          # The `-skip` regex uses parentheses for alternation — those
          # are shell-special characters when the goflags string gets
          # interpolated into the `go test` command line below.
          # Single-quote the regex so bash treats it as a literal arg
          # rather than trying to parse `(...)` as a subshell. Without
          # the quotes, the v0.72.3 first deploy failed at the shell-
          # parse step with `syntax error near unexpected token '('`.
          # internal/pipeline/backup carries the backup/restore/chain
          # orchestration carved out of the flat pipeline root (audit
          # 3.7b-2). Its tests are unit-only today, but the package is
          # listed here so any future integration-tagged backup/restore
          # test actually RUNS — the shard-coverage guard's prefix match
          # (internal/pipeline covers the subtree) would otherwise pass
          # green while this non-recursive `./internal/pipeline/` shard
          # silently skipped it (the exact false-confidence class the
          # guard exists to prevent).
          - name: pipeline-rest-other
            packages: "./internal/pipeline/ ./internal/pipeline/backup/"
            goflags: "-skip '^(TestMigrate_|TestStreamer_)'"
          - name: engines-mysql
            packages: "./internal/engines/mysql/..."
            goflags: ""
          - name: engines-postgres-and-rest
            packages: "./internal/engines/postgres/... ./internal/engines/pgtrigger/... ./internal/engines/mydumper/... ./internal/ir/... ./internal/translate/... ./internal/redact/... ./internal/crypto/... ./internal/config/... ./internal/notify/..."
            goflags: ""
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go mod download

      # Log in to ghcr.io and pre-pull the pre-baked images the tests
      # need (task #68). GITHUB_TOKEN has `packages: read` from the
      # job-level permissions block; the `sluicesync/sluice-*` packages are
      # owned by the same org as the workflow so no PAT is needed.
      #
      # Pre-pulling up-front (rather than letting testcontainers-go pull
      # implicitly on first boot) gives a cleaner failure mode: a
      # registry problem surfaces here, before any test code, instead of
      # mid-test as a timeout. The pre-baked images (built by
      # .github/workflows/build-prebaked-images.yml) have the heavy
      # first-boot init already done, dropping cold-start from ~30-60s
      # (up to 2-3 min under self-hosted disk-I/O contention) to ~5s; the
      # pgvector image (ADR-0032 PG→PG extension passthrough,
      # migrate_pgvector_integration_test.go) is a postgres:16 superset.
      # See docs/dev/ci-images.md. (postgis is pulled in its own job.)
      #
      # The login + pulls run through scripts/ci-ghcr-pull.sh, which
      # retries with backoff: the self-hosted runner pool intermittently
      # hits `docker login ghcr.io: context deadline exceeded` / pull
      # i/o timeouts, and a transient blip would otherwise red-fail the
      # whole shard (costing a manual `gh run rerun --failed`). Genuine
      # registry outages still fail loudly after the retry budget.
      - name: Log in to ghcr.io + pre-pull pre-baked images (bounded retry)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-ghcr-pull.sh \
            ghcr.io/sluicesync/sluice-mysql:8.0-prebaked \
            ghcr.io/sluicesync/sluice-postgres:16-prebaked \
            ghcr.io/sluicesync/sluice-pgvector:0.7.4-pg16-prebaked

      # The STOCK images: several tests deliberately use upstream
      # postgres:16 / mysql:8.0 (the pgtrigger cdc-reader, hstore/pg_trgm,
      # cutover, mysql-boot-retry, translate fixtures) rather than the
      # pre-baked supersets, and the PG17 FAILOVER-flag tests
      # (cdc_reader_integration_test.go) boot stock postgres:17 (its cold
      # docker.io pull mid-test flaked TestServerVersionNum_PG17 on three
      # tag runs, v0.99.29/31/32, before being pre-pulled). Task #36:
      # after a further full docker.io outage failed a PR shard on
      # postgres:16 through the whole 5-attempt retry budget, these now
      # come from the GHCR mirrors (pure retags published by
      # build-prebaked-images.yml). ci-mirror-pull.sh pulls each mirror
      # and retags it locally back to the stock name, so the test-time
      # boot (PullIfNotPresent) hits the local cache without any test
      # change; if a mirror is unavailable (GHCR outage / not yet
      # published) it ::warning-falls-back to the direct docker.io pull —
      # i.e. exactly the previous behavior, never worse.
      - name: Pre-pull stock images via their GHCR mirrors (docker.io fallback)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-mirror-pull.sh \
            postgres:16 \
            postgres:17 \
            mysql:8.0

      # Run every package's integration tests. -count=1 disables the
      # test cache so we always exercise real containers (cached results
      # would defeat the point). -race catches data-race bugs in the
      # reader/writer code paths under realistic concurrency.
      #
      # -timeout=35m bumps the per-test-binary timeout from Go's
      # 10-minute default. History: v0.11.2 surfaced 10-minute
      # false-failure timeouts where internal/engines/mysql and
      # internal/pipeline accumulated the budget across ~30
      # testcontainer boots × ~30s each + per-test work × -race
      # overhead — bumped to 18m. v0.22.0 (Phase 6.1 encryption) added
      # ~7 crypto integration tests to internal/pipeline; bumped to 25m
      # for headroom. v0.68.0: the internal/pipeline package binary
      # under -race reached ~25m at v0.67.1 (ADR-0046 inline-rotation
      # crash-injection matrix ×5 + 8-segment zero-loss + the full
      # backup/restore surface), and ADR-0047's verbatim integration
      # tests tipped it over — a stale budget vs an organically grown
      # suite, NOT a logic regression (Phase A: `panic: test timed out
      # after 25m0s`, no FAIL/DATA RACE). Bumped to 35m for durable
      # headroom; the job's timeout-minutes caps the outer envelope
      # (kept inner < outer so Go's diagnostic timeout-panic fires
      # before any hard job kill). v0.x self-hosted: the 4-vCPU runner
      # under -race does not finish the cross-engine + fuzz + CDC suite
      # in 35m (Phase A: `panic: test timed out after 35m0s`, still
      # progressing — slower box, NOT a logic regression). Inner budget
      # is CI_INTEGRATION_TIMEOUT (default 35m); raise it with the outer
      # CI_INTEGRATION_JOB_TIMEOUT for self-hosted (invariant above).
      - run: go test -tags=integration -race -count=1 -timeout=${{ vars.CI_INTEGRATION_TIMEOUT || '35m' }} ${{ matrix.shard.goflags }} ${{ matrix.shard.packages }}

  # ----- Integration (rollup) -----
  # Rolls up the `integration` matrix shards into a single
  # required status check NAMED `Integration` — preserving the
  # branch-protection check name so `main`'s required-checks list
  # does NOT need to be updated when the matrix shape changes. All
  # shards must succeed; any failure (or cancellation) fails the
  # rollup. `if: always()` ensures this job runs even when a matrix
  # shard fails so the rollup reports a definite verdict (a skipped
  # `needs:`-job is the GitHub default when a dependency fails and
  # would leave the required check stuck "expected — waiting").
  integration-summary:
    name: Integration
    needs: integration
    if: always()
    runs-on: ubuntu-latest
    # One echo + one conditional — minutes, not GitHub's 6-h default.
    timeout-minutes: 5
    steps:
      - name: assert all integration shards succeeded
        run: |
          echo "matrix result: ${{ needs.integration.result }}"
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "::error::one or more Integration shards did not succeed (result=${{ needs.integration.result }})"
            exit 1
          fi

  # ----- Integration: PostGIS -----
  # Split out as a separate parallel job in v0.29.0 (was in-line as a
  # second step on the integration job through v0.28.0; that approach
  # ran -tags="integration postgis" which is additive — Go's tag system
  # compiled BOTH the integration-tagged files AND the postgis-tagged
  # files, so the step re-ran the entire integration suite for the
  # pipeline package on top of the postgis-specific tests. v0.28.0's
  # 5 force-tag-moves and ballooning timeout budget surfaced the cost).
  #
  # The `-run 'PostGIS_'` filter scopes the run to ONLY the postgis
  # integration suites (the build-tag additivity is unavoidable, but
  # `-run` selects which tests actually execute). The CONVENTION — made
  # non-falsifiable by scripts/check-run-filter-coverage.sh in the Lint job —
  # is: every test in a `//go:build … postgis`-tagged file MUST have a
  # `PostGIS_` segment in its name AND live in a package this job's path
  # list covers. The three suites today:
  #   - internal/pipeline/migrate_postgis_integration_test.go
  #       (TestMigrate_PostGIS_*  — MySQL↔PG geometry round-trips)
  #   - internal/pipeline/migrate_pg_postgis_passthrough_integration_test.go
  #       (TestMigrate_PG_PostGIS_*  — PG→PG GiST/SP-GiST/BRIN index +
  #        geography + Z/ZM/M passthrough + target-missing refusal)
  #   - internal/engines/postgres/change_applier_pipelined_postgis_integration_test.go
  #       (TestPipelined_PostGIS_*  — ADR-0092 pipelined-vs-serial geometry
  #        equivalence pin; this is the guard for the geometry-codec work)
  # The narrower `TestMigrate_PostGIS_` filter used through v0.99.53 matched
  # ONLY the first suite — the passthrough (10 tests) and the engine-package
  # pipelined pin (1 test) compiled but never ran in CI. `PostGIS_` (trailing
  # underscore) matches all three but EXCLUDES the fast unit tests named
  # `…PostGIS` without a trailing `_` (e.g. TestPGPostGISEmit_SentinelRefusal),
  # which already run in the Test job.
  #
  # Image: ghcr.io/sluicesync/sluice-postgis:16-3.4-prebaked (Task #68).
  # 30m timeout — the suite has 13 tests today; each boots its own pre-baked
  # postgis container (~10-30s) and runs under -race. Headroom for growth.
  integration-postgis:
    name: Integration (PostGIS)
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    # Disable ryuk on CI — see the integration job's env block.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    timeout-minutes: 30
    # See the integration job's permissions block for the rationale.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go mod download
      # Task #68: pre-baked MySQL/Postgres/PostGIS images. Login + pulls
      # go through scripts/ci-ghcr-pull.sh (bounded retry) — same
      # cold-start + transient-GHCR-flake rationale as the main
      # integration job above.
      - name: Log in to ghcr.io + pre-pull pre-baked images (bounded retry)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-ghcr-pull.sh \
            ghcr.io/sluicesync/sluice-mysql:8.0-prebaked \
            ghcr.io/sluicesync/sluice-postgres:16-prebaked \
            ghcr.io/sluicesync/sluice-postgis:16-3.4-prebaked
      - run: go test -tags="integration postgis" -race -count=1 -timeout=25m -run 'PostGIS_' ./internal/pipeline/... ./internal/engines/postgres/...

  # ----- Integration (vstream) -----
  # The PlanetScale/Vitess VStream path is exercised end-to-end against a
  # real `vitess/vttestserver:mysql80` local cluster (booted by
  # testcontainers, ~10-45s/test). Historically these `integration &&
  # vstream`-tagged tests ran only locally — no CI job passed the
  # `vstream` tag — which is exactly how Bug 125 (a CRITICAL silent-loss
  # class: the COPY dedup dropped ~70% of rows when Vitess's scan order
  # diverged from the flagged PK column) reached a release: no unit test
  # or standard `integration` test reproduces it; only the vstream matrix
  # does. This job closes that gap and runs the matrix under -race on
  # every push.
  #
  # Dedicated job (not folded into the main integration shards) because
  # vttestserver boots a full Vitess cluster — heavier and slower than a
  # plain mysql:8.0 — and we want its cost + any startup flakiness
  # isolated from the core shards while its CI reliability is observed.
  # It IS in `main`'s required-checks list (promoted after its first
  # clean cycles) — do not disable it to save CI cost without also
  # updating branch protection, or merges will wedge on a check that
  # never reports.
  #
  # Build-tag additivity (same as the PostGIS job): `-tags="integration
  # vstream"` compiles BOTH the integration- and vstream-tagged files, so
  # `-run 'TestVStream_'` scopes execution to the vstream suite in the
  # mysql engine package (Bug 125 matrix + VTTestServer CDC/snapshot +
  # schema-evolution). Every vstream-tagged test in this package MUST
  # carry the TestVStream_ prefix or this filter silently skips it —
  # enforced by scripts/check-run-filter-coverage.sh in the Lint job.
  # The pipeline-package vstream suite runs in extended-suites.yml's
  # `vstream-pipeline` leg (weekly + dispatch), under the same guard.
  #
  # Images: vitess/vttestserver:mysql80 (Docker Hub, public — the source
  # cluster) + the pre-baked sluice-mysql target. 35m outer / 30m inner
  # timeout (inner < outer so Go's diagnostic timeout-panic fires before
  # a hard job kill), with headroom for the per-test cluster boots.
  integration-vstream:
    name: Integration (vstream)
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    # Disable ryuk on CI — see the integration job's env block.
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    timeout-minutes: 35
    # See the integration job's permissions block for the rationale.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go mod download
      - name: Log in to ghcr.io + pre-pull the pre-baked MySQL target (bounded retry)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-ghcr-pull.sh \
            ghcr.io/sluicesync/sluice-mysql:8.0-prebaked
      # Via the GHCR mirror (task #36): a transient docker.io "context
      # deadline exceeded" red-failed this job on a PR run (2026-06-10)
      # even through the bounded-retry wrapper's budget. The helper pulls
      # ghcr.io/sluicesync/sluice-mirror-vttestserver:mysql80 (a pure
      # retag) and retags it locally to the stock name the tests boot;
      # docker.io remains the ::warning fallback if the mirror is down.
      - name: Pre-pull vttestserver via its GHCR mirror (docker.io fallback)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-mirror-pull.sh vitess/vttestserver:mysql80
      - run: go test -tags="integration vstream" -race -count=1 -timeout=30m -run 'TestVStream_' ./internal/engines/mysql/...

  # ----- Lint -----
  # golangci-lint runs many static analyzers in a single pass. We use the
  # official action which handles caching and version selection. Linting
  # is OS-independent so we only need one runner.
  lint:
    name: Lint
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    # A wedged step otherwise runs to GitHub's 6-hour default. The
    # budget covers golangci-lint (~3-5m) + the per-combo vet matrix
    # (~3m cold) with generous headroom.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go mod download

      # Type-check every build-tag combination in use — including
      # tagged *test* files, which `go build -tags=...` skips (the
      # v0.58.1 retag class: a symbol rename an integration-tagged
      # test still references compiles clean everywhere and only
      # fails when that suite finally runs). Tag combos are
      # discovered from the tree, so a new tagged suite is gated
      # here automatically — no hand-maintained list to rot.
      - name: vet build-tag combinations
        run: bash scripts/vet-tags.sh

      # The integration shard matrix above is a hand-maintained
      # package list; this guard fails CI when a package containing
      # integration-tagged tests is missing from it (the mechanism
      # that let the pgtrigger engine sit outside every shard for
      # two weeks). Its matching mirrors the matrix's recursion
      # semantics exactly (audit N-17b): `./internal/pipeline/` is
      # non-recursive, so an integration test in a pipeline
      # SUBPACKAGE fails the guard until the shard lists it.
      - name: check integration shard coverage
        run: bash scripts/check-shard-coverage.sh

      # Companion to the shard-coverage guard for every `-run`-filtered
      # job: build-tag additivity means a tagged test can compile
      # vet-clean yet never RUN when its name escapes the job's `-run`
      # regex or its package sits outside the job's path list. This
      # guard fails CI on any escapee across every filtered axis
      # (the postgis-only predecessor caught the 11 tests hidden
      # through v0.99.53; the generalization caught four more escapees
      # on the vstream/chaos axes, 2026-07-03). It also auto-discovers
      # the tag-axis set from the tree (audit N-17a) — a brand-new
      # build tag with no workflow leg and no documented exemption
      # fails here — and cross-checks each manifest regex verbatim
      # against its workflow file so the hand-copied mirror can't
      # drift one-sided.
      - name: check -run filter coverage
        run: bash scripts/check-run-filter-coverage.sh

      # skills↔CLI doc-sync: every --flag AND `sluice <subcommand>` referenced
      # in skills/ must resolve to a real kong flag / command in cmd/sluice. A
      # renamed/removed flag or subcommand fails here, not in a user's agent
      # session — the in-repo advantage the skills pack exists for
      # (docs/research/ai-skills-pack.md, "Repo location").
      - name: check skills CLI-surface coverage
        run: bash scripts/check-skills-flags.sh

      - uses: golangci/golangci-lint-action@v9.3.0
        with:
          # @v8+ of the action natively requires golangci-lint v2 (the
          # major-version split happened in early 2026). Our
          # .golangci.yml is in v2 schema — see the file header for
          # the migration notes. Earlier versions of the action (@v6,
          # @v7) defaulted goinstall to the v1 module path, which
          # silently installed v1.64.8 even when "version: latest" was
          # set; @v8+ uses the v2 module path correctly.
          version: latest
          # install-mode: goinstall compiles golangci-lint from source
          # using the Go toolchain we just installed, so the linter's
          # embedded type-checker matches the Go version declared in
          # go.mod. Prebuilt v2 binaries lag the latest Go release;
          # without this, packages that require Go 1.26 features (like
          # the stdlib's chacha20poly1305 fips140only_go1.26.go file)
          # fail to typecheck during lint.
          install-mode: goinstall
          # Fail the job on any issue. Combined with branch protection
          # this means you can't merge until lint is clean.
          args: --timeout=5m

  # ----- govulncheck -----
  # Reachability-based vulnerability scanning: unlike Dependabot alerts
  # / CodeQL (which flag vulnerable *versions*), govulncheck reports
  # only vulnerabilities whose affected symbols are actually reachable
  # from this module's call graph — high signal, near-zero noise.
  #
  # Triage path for a red run: `go get <module>@<fixed-version> && go
  # mod tidy` when a fixed version exists (Dependabot usually has the
  # PR open already); otherwise read the finding's trace, decide
  # whether the reachable path matters for sluice, and either pin a
  # workaround or accept-with-comment here. Do NOT silence the job to
  # get a merge through. Not in the required-checks list yet — watch
  # its signal for a cycle, then promote via branch protection.
  govulncheck:
    name: govulncheck
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # ----- Build -----
  # A separate build smoke-test confirms `./cmd/sluice` compiles on every
  # platform — useful because pure unit tests don't always exercise the
  # main package. Cheap and gives a clear signal when a Windows-only
  # build break sneaks in. Same conditional matrix as the test job:
  # Linux+Windows on tag/dispatch, Linux-only on push/PR. macOS binaries
  # ship from GoReleaser without a CI build pass — see workflow-header
  # cost-shape note.
  build:
    name: Build (${{ matrix.os }})
    # Explicit cap so a wedged step can't run to GitHub's 6-hour
    # default; a full build takes ~2-3m.
    timeout-minutes: 15
    # Same self-hosted selector as the test job — see that comment.
    runs-on: ${{ (matrix.os == 'windows-latest' && (vars.CI_WINDOWS_RUNNER || 'windows-latest')) || (vars.CI_LINUX_RUNNER || 'ubuntu-latest') }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON((github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && '["ubuntu-latest","windows-latest"]' || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go build ./...
