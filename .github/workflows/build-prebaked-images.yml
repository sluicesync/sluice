# Pre-baked CI image builder.
#
# Runs `scripts/build-prebaked-images.sh` to rebuild the
# ghcr.io/sluicesync/sluice-{mysql,postgres,postgis,pgvector} images that
# `ci.yml`'s integration jobs consume, plus MIRROR the vitess/lite server
# tags (scripts/vitess-versions.txt) to ghcr.io/sluicesync/sluice-vitess for
# the gated multi-version cluster matrix (vitess-version-matrix.yml), plus
# MIRROR the stock docker.io images CI pre-pulls (postgres:16 + the
# scripts/pg-versions.txt majors, mysql:8.0, vitess/vttestserver:mysql80)
# to ghcr.io/sluicesync/sluice-mirror-<name>:<tag> as pure retags (task
# #36 — removes docker.io from CI's critical path; consumers pull via
# scripts/ci-mirror-pull.sh with a docker.io fallback). The
# script is idempotent
# (skips when the upstream base digest hasn't moved) so the weekly
# cron is a no-op on uneventful weeks and rebakes when MySQL 8.0 /
# postgres:16 / postgis:16-3.4 / pgvector:0.7.4-pg16 publish a patch
# bump upstream. Task #70 added pgvector to eliminate docker.io as a
# single point of failure for CI pulls.
#
# Why this workflow exists at all:
#   Tasks #60, #63, #64, and #69 walked the integration-suite boot
#   timeout / retry budget upward to absorb disk-I/O contention on
#   the self-hosted runner when multiple MySQL containers boot
#   concurrently. The first-boot init (mysqld --initialize-insecure
#   writes 50-100MB; initdb writes ~40MB) is the root cause. Baking
#   that step into the image eliminates it; cold-start drops from
#   30-60s (or 2-3 min under contention) to ~5s.
#
# Triggers:
#   - weekly cron (Sunday 06:00 UTC): keep current with upstream
#     patch bumps without operator action.
#   - workflow_dispatch: manual rebake from the UI, e.g. for a base-
#     image security advisory before the next Sunday tick.
#   - push on this workflow file or the build script: prove a change
#     to the bake logic still pushes successfully.
#
# Failure surface:
#   GitHub's default behavior on a workflow_run failure emails the
#   commit author / scheduled-event subscriber (the repo owner here).
#   No extra notification plumbing required.

name: Build pre-baked CI images

on:
  schedule:
    # 06:00 UTC every Sunday. Off-hours for the repo owner's timezone
    # (US west coast) so a flaky bake doesn't compete with active dev.
    - cron: "0 6 * * 0"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/build-prebaked-images.sh"
      # ci-mirror-pull.sh owns the mirror naming rule the bake consumes
      # via --print-ref; pg-versions.txt drives the postgres mirror list.
      # A change to either must republish the mirrors promptly (e.g. a
      # new PG major) rather than waiting for the Sunday cron.
      - "scripts/ci-mirror-pull.sh"
      - "scripts/pg-versions.txt"
      - ".github/workflows/build-prebaked-images.yml"
  # Also run on PRs that touch the bake script or this workflow so
  # the bake logic is exercised end-to-end before merge. Without this
  # the first cron run after merge becomes the integration test for
  # the bake itself, which has bitten this kind of CI plumbing before.
  # SECURITY: the PR path is BUILD-ONLY (the bake-pr job below runs
  # with a read-only token and SKIP_PUSH=1) — a pull_request run
  # executes the PR branch's copy of the bake script, so granting it
  # packages:write would let unreviewed PR code publish the prod-tag
  # images every CI integration job boots. Forks and same-repo PRs
  # behave identically: build exercised, nothing published. Publishing
  # happens only on the trusted triggers (cron / dispatch / push to
  # main), via the bake job.
  pull_request:
    paths:
      - "scripts/build-prebaked-images.sh"
      - "scripts/ci-mirror-pull.sh"
      - "scripts/pg-versions.txt"
      - ".github/workflows/build-prebaked-images.yml"

# Default-deny at the workflow level; the GHCR write scope is granted
# job-scoped, ONLY to the publishing job (bake) — never to the
# pull_request build-only job. `contents: read` is required for
# actions/checkout.
permissions:
  contents: read

# Cancel a queued run if a new push to this workflow lands. Cron runs
# don't interfere with each other (different ref each time).
concurrency:
  group: build-prebaked-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # The publishing job: trusted triggers only (cron / dispatch / push
  # to main — code that has already landed). This is the ONLY job that
  # holds packages:write.
  bake:
    name: Bake ${{ matrix.engine }} image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Job-scoped GHCR write (see the workflow-level permissions note).
    # `packages: write` grants the GITHUB_TOKEN that scope so we don't
    # need a separate PAT. id-token unused — docker login with the
    # GITHUB_TOKEN is sufficient for ghcr.io within the same org.
    permissions:
      contents: read
      packages: write
    # Pre-baking is independent per engine; run them in parallel.
    # If one engine fails the others still publish — partial progress
    # is better than none, and the failed engine's CI shard will
    # keep using whatever was last published (or the upstream image if
    # never published).
    strategy:
      fail-fast: false
      matrix:
        engine: [mysql, postgres, postgis, pgvector, vitess, mirrors]
    # 30 (was 20): the `vitess` engine MIRRORS ~5 x 2.7GB vitess/lite tags
    # (scripts/vitess-versions.txt) — a pull+push per version, heavier than the
    # single-image DB bakes. The DB shards finish well inside 20m regardless.
    # The `mirrors` engine (task #36) is ~6 stock images totalling ~3GB —
    # comfortably inside the same budget.
    timeout-minutes: 30
    steps:
      # SHA-pinned (not @v7): this job holds packages:write, so a
      # re-pointed action tag would run arbitrary code with GHCR push
      # rights — same supply-chain rationale as release.yml's pins.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # GHCR_TOKEN is the GITHUB_TOKEN piped through to the script
      # (the script accepts GHCR_TOKEN or GITHUB_TOKEN). GHCR_USER is
      # the actor who triggered the workflow — for scheduled runs this
      # is `github-actions[bot]`, for workflow_dispatch / push it's the
      # operator's GitHub login. Either is accepted by ghcr.io when
      # paired with a GITHUB_TOKEN of sufficient scope.
      - name: Build + push ${{ matrix.engine }} image
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          ENGINES: ${{ matrix.engine }}
          # When the bake script or workflow file itself changes, the
          # base-image digest hasn't moved but the bake LOGIC has — the
          # script's default base-digest-match skip would silently
          # reuse the old image (this bit PR #70's first iteration of
          # the pg_hba.conf fix). Force a rebuild on push and dispatch
          # triggers; the weekly cron stays optimised against the
          # base-digest check.
          FORCE_REBUILD: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
        run: |
          bash scripts/build-prebaked-images.sh

  # The PR job: build-only proof that the bake logic still works,
  # with a read-only token and SKIP_PUSH=1 (the script skips ghcr
  # login entirely under SKIP_PUSH, so no credential is needed or
  # granted). Unreviewed PR code can never publish the prod-tag
  # images this way — see the pull_request trigger comment above.
  bake-pr:
    name: Bake ${{ matrix.engine }} image (PR, build-only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        engine: [mysql, postgres, postgis, pgvector, vitess, mirrors]
    timeout-minutes: 30
    steps:
      # SHA-pinned to match the publishing job (one pin to maintain).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build ${{ matrix.engine }} image (no push)
        env:
          ENGINES: ${{ matrix.engine }}
          SKIP_PUSH: "1"
          # PR runs change the bake LOGIC, not the base digest — force
          # the rebuild so the changed logic is what gets exercised.
          FORCE_REBUILD: "1"
        run: |
          bash scripts/build-prebaked-images.sh
