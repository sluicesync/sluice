# Multi-version Vitess cluster matrix (roadmap item 1(e)).
#
# Boots the REAL multi-process Vitess cluster (the gated `vitesscluster`
# build-tag harness) against a sweep of Vitess SERVER versions and runs the
# full cluster correctness suite on each — Bug-27 VStream-POINT geometry,
# OnlineDDL cutover zero-loss (both shape tests), and the PrimaryOnly
# tablet-type pair — proving the vendored vitess.io/vitess v0.24.1 client
# behaves correctly across newer-client -> older-server skew (the direction
# Vitess supports for rolling upgrades).
#
# The weekly default was Bug-27-only until 2026-07-03 (a paid-minutes cost
# call); with the repo public, standard runners are free, so the default
# widened to the full suite (operator-approved). If a suite proves flaky on
# hosted runners across a few weekly cycles, narrow the default back and
# document the exclusion here. The scheduled default filter is pinned by
# scripts/check-run-filter-coverage.sh (vitesscluster axis).
#
# This is NOT part of the per-PR `ci.yml` gate — it is a heavy, scheduled /
# on-demand job (each matrix leg boots a 5-container cluster). It is never a
# required status check, so it never blocks a merge.
#
# Versions come from scripts/vitess-versions.txt (the single source of truth,
# shared with the prebake mirror + the local scripts/vitess-version-matrix.*).
# Each leg pulls the PRE-BAKED GHCR mirror (ghcr.io/sluicesync/sluice-vitess:
# <tag>, published by build-prebaked-images.yml's `vitess` engine) rather than
# docker.io — faster, and no docker.io rate-limit SPOF. The mirror must have
# run at least once before this matrix's first run (the weekly cron orders
# them: prebake at 06:00 Sun, this at 08:00 Sun).
#
# `:latest` is the forward-compat CANARY (continue-on-error) — its failure is
# the signal that a newer Vitess major diverged from the vendored client (time
# to bump the client), not a red build.
#
# The suite runs with -race (added 2026-07-09): this was the only real-cluster
# suite outside the race gate — the chaos/reshard legs in extended-suites.yml
# have carried it since the 2026-07-03 repo audit (item 0.4). Budgets are
# bumped ~1.5x from the pre-race 40m inner / 45 outer, mirroring those legs.

name: Vitess version matrix

on:
  schedule:
    # 08:00 UTC Sunday — 2h after build-prebaked-images.yml (06:00) so the
    # week's GHCR mirrors are fresh before this sweeps them.
    - cron: "0 8 * * 0"
  # Tag pushes run ONLY the lean `filtered-tag-gate` job below (a single-version
  # cluster boot of the ADR-0174 filtered move-OUT crux), NOT the full weekly
  # version matrix. F-T2 (audit 2026-07-18): the `vitesscluster` filtered
  # move-OUT test was weekly-only, so v0.99.278 shipped ~2 days before its gate
  # could run and a Critical rode along. This puts the load-bearing "vtgate
  # emits BOTH before/after images on a non-vindex move" wire behavior — which
  # NO unit pin can prove — onto the release path so it executes before a tag
  # publishes. The heavy full-version sweep stays schedule/dispatch-only.
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run:
        description: "go test -run filter (default: the full cluster suite; narrow to TestVitessCluster_Bug27 for the quick geometry-only sweep)"
        required: false
        default: "TestVitessCluster"

permissions:
  contents: read
  packages: read

concurrency:
  group: vitess-version-matrix-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Build the job matrix from scripts/vitess-versions.txt so the version list
  # lives in exactly one place. Emits [{version, image, canary}, ...] where
  # image is the GHCR mirror and canary is true only for the :latest tag.
  setup:
    name: Resolve version matrix
    # Schedule/dispatch only — a tag push runs the lean filtered-tag-gate job,
    # never the full version sweep (see the `on:` push comment).
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
      - id: gen
        run: |
          entries=$(grep -vE '^[[:space:]]*#|^[[:space:]]*$' scripts/vitess-versions.txt | while read -r ref; do
            tag="${ref##*:}"
            ghcr="ghcr.io/sluicesync/sluice-vitess:${tag}"
            canary=false
            [ "$tag" = "latest" ] && canary=true
            printf '{"version":"%s","image":"%s","canary":%s}\n' "$tag" "$ghcr" "$canary"
          done | jq -s -c '.')
          echo "resolved matrix: $entries"
          echo "matrix=$entries" >> "$GITHUB_OUTPUT"

  cluster:
    name: Cluster suite on Vitess ${{ matrix.version }}
    # Schedule/dispatch only (see setup). Tag pushes use filtered-tag-gate.
    if: github.event_name != 'push'
    needs: setup
    runs-on: ubuntu-latest
    # The :latest leg is a forward-compat canary — let it fail without failing
    # the workflow. Pinned v21..v24 legs are fatal on failure.
    continue-on-error: ${{ matrix.canary }}
    permissions:
      packages: read
    # 70: the pre-race 45 (was 30 when the default ran only Bug-27) bumped
    # ~1.5x for the -race overhead (the chaos/reshard-leg precedent —
    # -race roughly halves throughput on the CPU-bound stretches). The
    # full suite runs 5 tests per leg against the booted cluster; the
    # OnlineDDL cutover pair is the long pole. Inner (60m) stays < outer
    # so Go's diagnostic timeout-panic fires before the hard job kill.
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pre-pull the pre-baked GHCR mirror (bounded retry, same helper the
      # ci.yml integration jobs use). The compose `up` then finds the image
      # already local and only pulls the small etcd image from quay.io.
      - name: Log in to ghcr.io + pull the pre-baked Vitess image
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-ghcr-pull.sh "${{ matrix.image }}"

      # Boot the cluster on this version and run the cluster suite.
      # VITESS_LITE_IMAGE points the compose file + harness at the GHCR mirror;
      # the harness parses the major from the tag and layers the legacy-flag
      # override for major <= 22 (v21/v22).
      # The dispatch input reaches the script via env (shell-expanded),
      # never interpolated into the `run:` text — the fuzz-roundtrip.yml
      # env-indirection pattern.
      - name: Boot cluster + run ${{ github.event.inputs.run || 'TestVitessCluster' }}
        env:
          VITESS_LITE_IMAGE: ${{ matrix.image }}
          RUN_FILTER: ${{ github.event.inputs.run || 'TestVitessCluster' }}
        run: |
          go test -tags='integration vitesscluster' -race -count=1 -timeout=60m \
            -run "$RUN_FILTER" \
            -v ./internal/engines/mysql/...

  # ----- filtered-tag-gate (release path) -----
  # F-T2 (audit 2026-07-18): the ADR-0174 filtered move-OUT correctness crux —
  # vtgate emitting BOTH before/after images on a NON-vindex `--where` move so
  # the pipeline's client-side row-move table can turn a move-OUT into a target
  # DELETE — has NO unit pin (it is a real Vitess wire behavior). Its only
  # end-to-end gate (TestVitessClusterFilteredSync, `vitesscluster`-tagged) was
  # weekly-only, so v0.99.278 was tagged/published ~2 days before it could run
  # and a Critical shipped. This job runs that ONE test on a tag push, on a
  # SINGLE pinned Vitess version (the vendored-client major), so the crux gets
  # CI execution BEFORE a tag publishes. It is NOT a branch-protection required
  # check (tag pushes aren't PRs) — the release operator watches it alongside
  # ci.yml/release.yml on the tag, per the CLAUDE.md publish gate. The heavy
  # full-version sweep stays weekly. -race per the concurrency-chunk gate.
  filtered-tag-gate:
    name: Filtered move-OUT gate (tag)
    if: github.event_name == 'push'
    runs-on: ${{ vars.CI_LINUX_RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: read
    # One test, one cluster boot; mirrors the cluster job's -race budget shape
    # for a single leg (inner 40m < outer 45m).
    timeout-minutes: 45
    env:
      # Pin to the vendored-client major (vitess.io/vitess v0.24.x). The GHCR
      # mirror tag mirrors scripts/vitess-versions.txt's v24 entry.
      VITESS_TAG: v24.0.1
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Log in to ghcr.io + pull the pre-baked Vitess image
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-ghcr-pull.sh "ghcr.io/sluicesync/sluice-vitess:${VITESS_TAG}"
      # Same env-indirection as the cluster job: the image ref reaches the
      # harness via VITESS_LITE_IMAGE, never interpolated into the run text.
      - name: Boot cluster + run TestVitessClusterFilteredSync
        env:
          VITESS_LITE_IMAGE: ghcr.io/sluicesync/sluice-vitess:${{ env.VITESS_TAG }}
        run: |
          go test -tags='integration vitesscluster' -race -count=1 -timeout=40m \
            -run TestVitessClusterFilteredSync \
            -v ./internal/engines/mysql/...
