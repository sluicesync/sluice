# PlanetScale verification workflow.
#
# Exercises sluice's Postgres engine and orchestrator against a real
# PlanetScale account using the credentials stored as repo secrets.
# Gated behind the `psverify` build tag so the test files are excluded
# from the default CI Test/Integration jobs and do nothing in a checkout
# without credentials.
#
# Triggers:
#   - workflow_dispatch:  manual run from the Actions tab. Use this when
#                         you want to confirm sluice still works against
#                         the live PS-PG account on demand (e.g., after
#                         a non-trivial Postgres-engine change).
#   - schedule (commented out below): once-a-week regression run.
#                         Uncomment when you're confident the suite is
#                         stable; leaving it disabled by default keeps
#                         PlanetScale quota predictable while the suite
#                         is still maturing.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - SLUICE_MYSQL_SOURCE / SLUICE_MYSQL_DESTINATION
#   - SLUICE_POSTGRES_SOURCE / SLUICE_POSTGRES_DESTINATION
#   - PLANETSCALE_SERVICE_TOKEN_ID / PLANETSCALE_SERVICE_TOKEN
#   - PLANETSCALE_EC_ORG / _EC_DATABASE / _EC_BRANCH / _EC_DSN / _EC_TABLE
#   - PLANETSCALE_METRICS_SERVICE_TOKEN_ID / _METRICS_SERVICE_TOKEN /
#     _METRICS_ORG / _METRICS_DATABASE / _METRICS_BRANCH
#
# The DSN secrets hold the same strings the local PLANETSCALE_CREDENTIALS.env
# file holds; the token/EC/metrics secrets mirror the other local env files.
# The credential loaders in the test files read env vars first (the CI path)
# and fall back to the .env files (the dev-loop path), so one set of test
# code serves both. The EC_*/METRICS_DATABASE secrets point at live (usually
# throwaway) databases and are refreshed per dispatch.
#
# A missing secret does NOT green-skip: the fail-on-skip step below turns
# any skipped psverify test into a job failure (audit 2026-07-15 MED-T1 —
# this workflow sat at zero recorded runs while its env block satisfied
# only 2 of 6 suites, so a dispatch would have greened while skipping the
# rest). If this job is red with skips, wire the secrets; the loud red is
# the point.

name: PlanetScale Verify

on:
  workflow_dispatch:
  # Uncomment to enable a weekly Monday-06:00-UTC regression run.
  # Vendor changes (TLS cert renewals, pgwire-proxy rollouts) won't
  # surface until someone runs the suite, so a periodic check catches
  # drift even when nobody is touching engine code.
  # schedule:
  #   - cron: "0 6 * * 1"

# This workflow only reads repo contents (and writes nothing back). The
# secrets it consumes are scoped at the job's env block below.
permissions:
  contents: read

# Cancel any in-progress run from the same trigger when a new one starts.
# Two parallel runs against the same PlanetScale databases would race on
# the test fixtures (they share schema names like `sluice_psverify_*`).
concurrency:
  group: psverify
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  psverify:
    name: PS-PG verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # SHA-pinned (not the mutable tags): this workflow handles live
      # PlanetScale DSN secrets, so a re-pointed action tag would run
      # arbitrary code with access to them — same supply-chain
      # rationale (and same pins) as release.yml.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"
      - run: go mod download

      # Cheap pre-flight: prove the test files compile under the
      # `psverify` tag before we burn time hitting external services.
      - run: go vet -tags=psverify ./internal/...

      # The real run. Individual tests still t.Skip when their env vars
      # are missing (so the suite is runnable piecemeal locally), but in
      # CI the fail-on-skip step below converts ANY skip into a job
      # failure — this workflow's entire reason to exist is running the
      # live suites, so "green with skips" is the dishonest outcome.
      #
      # Scoping and serialization (both learned on the first dispatch,
      # 2026-07-16):
      #   * -run '^TestPS' + the explicit package list restricts the run
      #     to the psverify suites. A bare ./internal/... sweep also runs
      #     the whole unit suite, whose permanent placeholder skips
      #     (e.g. pipeline's TestChainRestore_CrossEnginePostGISNowSupported)
      #     false-positive the fail-on-skip gate — zero-skip would be
      #     unattainable.
      #   * The packages run SEQUENTIALLY (one go test invocation each,
      #     not a single multi-package invocation): engines/postgres and
      #     pipeline share the live PG source and its fixed `sluice_slot`
      #     replication slot, so package-parallel runs race on it. PS-PG
      #     also holds a just-closed reader's walsender "active" for tens
      #     of seconds (>40s observed), which the tests' slot pre-cleans
      #     wait out — but only if nobody else is competing for the slot.
      #
      # -count=1 disables the test cache (cached results would defeat
      # the point of verifying live infrastructure). -race catches
      # races in the reader/writer paths exercised against a real
      # backend, which the unit-test race coverage can't reach.
      #
      # The credential loaders read env vars first; the .env-file
      # fallback path doesn't fire in CI, so secrets land directly
      # via env: below.
      - name: Run PS verification suite
        env:
          SLUICE_MYSQL_SOURCE: ${{ secrets.SLUICE_MYSQL_SOURCE }}
          SLUICE_MYSQL_DESTINATION: ${{ secrets.SLUICE_MYSQL_DESTINATION }}
          SLUICE_POSTGRES_SOURCE: ${{ secrets.SLUICE_POSTGRES_SOURCE }}
          SLUICE_POSTGRES_DESTINATION: ${{ secrets.SLUICE_POSTGRES_DESTINATION }}
          PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
          PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
          PLANETSCALE_EC_ORG: ${{ secrets.PLANETSCALE_EC_ORG }}
          PLANETSCALE_EC_DATABASE: ${{ secrets.PLANETSCALE_EC_DATABASE }}
          PLANETSCALE_EC_BRANCH: ${{ secrets.PLANETSCALE_EC_BRANCH }}
          PLANETSCALE_EC_DSN: ${{ secrets.PLANETSCALE_EC_DSN }}
          PLANETSCALE_EC_TABLE: ${{ secrets.PLANETSCALE_EC_TABLE }}
          PLANETSCALE_METRICS_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_METRICS_SERVICE_TOKEN_ID }}
          PLANETSCALE_METRICS_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_METRICS_SERVICE_TOKEN }}
          PLANETSCALE_METRICS_ORG: ${{ secrets.PLANETSCALE_METRICS_ORG }}
          PLANETSCALE_METRICS_DATABASE: ${{ secrets.PLANETSCALE_METRICS_DATABASE }}
          PLANETSCALE_METRICS_BRANCH: ${{ secrets.PLANETSCALE_METRICS_BRANCH }}
        run: |
          set -o pipefail
          : > psverify-output.txt
          for pkg in \
            ./internal/planetscale/... \
            ./internal/engines/mysql \
            ./internal/engines/postgres \
            ./internal/pipeline; do
            go test -tags=psverify -race -count=1 -timeout=20m -v -run '^TestPS' "$pkg" | tee -a psverify-output.txt
          done

      # Fail on skip: a psverify run that skipped anything did not verify
      # what it claims to verify. The grep matches go test's verbose
      # "--- SKIP" markers; the skip reasons name the missing env vars,
      # so the failure message is self-remediating.
      - name: Fail if any psverify test was skipped
        run: |
          if grep -E '^\s*--- SKIP' psverify-output.txt; then
            echo "::error::psverify tests were SKIPPED (missing env/secrets above) — a green run must run everything. Wire the missing secrets and re-dispatch."
            exit 1
          fi
          echo "fail-on-skip: no skipped tests."
