# Release workflow.
#
# Triggered when a tag matching v* is pushed. Builds cross-platform
# binaries via GoReleaser (configured in .goreleaser.yaml) and publishes
# a draft GitHub release with the binaries attached.
#
# To cut a release locally:
#   git tag v0.1.0
#   git push origin v0.1.0
# GitHub Actions takes it from there.
#
# The release is created as a draft so you can review the changelog and
# binaries before clicking "Publish release" on GitHub.

name: Release

on:
  push:
    tags:
      - "v*"

# This workflow needs to write to the repository (creating releases and
# uploading assets) and to GHCR (pushing the runtime container image), so
# we opt in explicitly. Other tokens stay read-only.
permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # GoReleaser uses git history for the changelog. fetch-depth: 0
          # tells the checkout action to clone the full history, not just
          # the latest commit.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          # Reads the version from go.mod so CI tracks the declared
          # toolchain automatically.
          go-version-file: "go.mod"

      # QEMU + buildx so GoReleaser can build the linux/arm64 runtime
      # image alongside amd64 (the Dockerfile only COPYs the pre-built
      # binary, so this is a trivial cross-build, not an emulated compile).
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR so GoReleaser can push the container image.
      # GITHUB_TOKEN has packages:write (per the permissions block above).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The GoReleaser action runs the release process defined in
      # .goreleaser.yaml. GITHUB_TOKEN is automatically provided by
      # GitHub Actions and has permission (per the `permissions` block
      # above) to create releases on this repo.
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
