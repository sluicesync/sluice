# Release workflow.
#
# Triggered when a tag matching v* is pushed. Builds cross-platform
# binaries via GoReleaser (configured in .goreleaser.yaml) and publishes
# a draft GitHub release with the binaries attached.
#
# To cut a release locally:
#   git tag v0.1.0
#   git push origin v0.1.0
# GitHub Actions takes it from there.
#
# The release is created as a draft so you can review the changelog and
# binaries before clicking "Publish release" on GitHub.

name: Release

on:
  push:
    tags:
      - "v*"

# This workflow needs to write to the repository (creating releases and
# uploading assets) and to GHCR (pushing the runtime container image), so
# we opt in explicitly. Other tokens stay read-only.
permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # Explicit cap so a wedged step can't run to GitHub's 6-hour
    # default — that failure mode silently stalls the autonomous
    # release flow, which watches this workflow for completion.
    # A full release build (cross-platform binaries + multi-arch
    # image) takes ~10-15m.
    timeout-minutes: 30
    steps:
      # Every action below is pinned to a full commit SHA (with the
      # tracking tag in a trailing comment): this workflow runs with
      # contents:write + packages:write + TAP_GITHUB_TOKEN, so a
      # re-pointed mutable tag on any of these actions would mean
      # arbitrary code with release-signing/publish privileges
      # (poisoned binaries, images, tap formulae). Dependabot's
      # github-actions ecosystem updates SHA pins automatically.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # GoReleaser uses git history for the changelog. fetch-depth: 0
          # tells the checkout action to clone the full history, not just
          # the latest commit.
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          # Reads the version from go.mod so CI tracks the declared
          # toolchain automatically.
          go-version-file: "go.mod"

      # QEMU + buildx so GoReleaser can build the linux/arm64 runtime
      # image alongside amd64 (the Dockerfile only COPYs the pre-built
      # binary, so this is a trivial cross-build, not an emulated compile).
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Authenticate to GHCR so GoReleaser can push the container image.
      # GITHUB_TOKEN has packages:write (per the permissions block above).
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The GoReleaser action runs the release process defined in
      # .goreleaser.yaml. GITHUB_TOKEN is automatically provided by
      # GitHub Actions and has permission (per the `permissions` block
      # above) to create releases on this repo.
      #
      # The GoReleaser VERSION is pinned too (was `latest`): two builds
      # of the same tag must not differ because the tool under them
      # changed. Dependabot doesn't bump this one — revisit on majors.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token for the brews / scoops / winget pipes, which
          # commit a formula/manifest into sluicesync/{homebrew-tap,
          # scoop-bucket, winget-pkgs}. The default GITHUB_TOKEN can't push to
          # other repos. Fine-grained PAT, contents:write on those three repos.
          # Renders empty until the secret exists; brews/scoops/winget then
          # fail at release time, so don't tag a release until it's set.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
