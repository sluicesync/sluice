# Scheduled run for the heavy, previously-orphaned test suites
# (repo-audit M0.5): the Vitess chaos pair and the Vitess reshard
# correctness test. Until 2026-06-10 these suites had NO CI entry
# point at all — they only ran when someone remembered to run them
# locally (their build tags are at least type-checked on every PR by
# the Lint job's vet-tags matrix, but type-checking is not running).
#
# Cadence: weekly, Sunday 10:00 UTC — after the 06:00 prebake refresh
# and the 08:00 Vitess version matrix, so the GHCR mirrors are fresh
# and the runner pool isn't contended. Plus workflow_dispatch for
# on-demand runs (pre-release validation of VStream-path changes).
# Owner: the release operator; a red run here files a bug, it never
# blocks a merge (NOT a required check — each leg boots real
# multi-process Vitess clusters and runs fault injection, far too
# heavy and too stateful for the per-PR gate).
#
# The `ddlfixture` leg (repo-audit 2026-07-03 T-5) is DISPATCH-ONLY —
# it is excluded from the weekly schedule on purpose: the Dolt
# sqllogictest corpus harness is a fixture sweep, not a regression
# suite; run it on demand before/after schema-reader changes.
#
# The `corpus` leg (roadmap item 52) runs the real-world OSS-schema
# corpus on the weekly schedule (fetch-on-demand dumps + the item-51
# restore-parity oracle + sample-row verify over those schemas). It also
# compiles in the per-PR pipeline-migrate shard, but SKIPs there because
# the dumps are gitignored — this leg fetches them and is where they run.
#
# The `kmsverify` leg (audit N-17c) runs the AWS-KMS backup/restore
# suite against a real localstack KMS container. It sat here as a
# documented deliberate skip while every test body was t.Skip()
# scaffolding (scheduling it would have run five skips and reported
# green — the vacuous-pass failure mode); the scaffolding is now
# wired (round-trip, chain extension, wrong-key + missing-key
# refusals run for real; only the IAM access-denied case remains a
# skip, since localstack community edition doesn't enforce IAM).

name: Extended suites

on:
  schedule:
    - cron: "0 10 * * 0"
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run"
        required: false
        default: "all"
        type: choice
        options: [all, chaos, reshard, vstream-pipeline, corpus, ddlfixture, kmsverify]

permissions:
  contents: read
  packages: read

concurrency:
  group: extended-suites-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # The chaos suite: primary failover (PRS + ERS), tablet kill mid
  # cold-start, vtgate restart mid-sync, rolling upgrade mid-sync, plus
  # the Bug-146 purged-GTID proactive pre-flight pin — all against the
  # real compose cluster
  # (internal/engines/mysql/testdata/vitesscluster/docker-compose.yml).
  # Every chaos-tagged test MUST carry the TestVitessChaos_ prefix or
  # the -run filter below silently skips it (enforced by
  # scripts/check-run-filter-coverage.sh in ci.yml's Lint job).
  chaos:
    name: Vitess chaos suite
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'chaos' }}
    runs-on: ubuntu-latest
    # -race roughly halves throughput on the CPU-bound stretches
    # (repo-audit 2026-07-03 item 0.4 added it to this leg; the
    # vstream-pipeline leg had it from day one), so the pre-race
    # budgets (80m inner / 90 outer) are bumped ~1.5x. Inner stays
    # < outer so Go's diagnostic timeout-panic fires before the
    # hard job kill.
    timeout-minutes: 135
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The compose file defaults to vitess/lite:v24.0.1; point it at
      # the pre-baked GHCR mirror instead (no docker.io rate-limit
      # SPOF, same image bytes — build-prebaked-images.yml publishes a
      # pure retag).
      - name: Log in to ghcr.io + pull the pre-baked Vitess image
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-ghcr-pull.sh ghcr.io/sluicesync/sluice-vitess:v24.0.1

      # TestVitessChaos_RollingUpgrade_MidSync HARDCODES the literal
      # docker.io tags vitess/lite:v24.0.0 (initial boot) and
      # vitess/lite:v24.0.1 (mid-sync recreate) via
      # chaosUpgrade{From,To}Image, overriding VITESS_LITE_IMAGE. Without
      # this, both cold-pull from docker.io during the live per-service
      # recreate — and the recreate competes with a 5m PingTablet budget,
      # so a slow cold pull times the tablet-ping out (the ~2026-07-12
      # intermittent red). Warm BOTH into the local cache up front, off the
      # ping-budget path: v24.0.1 retags from its GHCR mirror; v24.0.0 has
      # no mirror (kept out of vitess-versions.txt by the one-minor-per-
      # major convention) so ci-mirror-pull falls back to a docker.io pull
      # here in this dedicated step (full retry budget, not the ping timer).
      - name: Warm the rolling-upgrade image cache (v24.0.0 + v24.0.1)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-mirror-pull.sh --mirror ghcr.io/sluicesync/sluice-vitess:v24.0.1 vitess/lite:v24.0.1
          bash scripts/ci-mirror-pull.sh --mirror ghcr.io/sluicesync/sluice-vitess:v24.0.0 vitess/lite:v24.0.0

      - name: Run the chaos suite
        env:
          VITESS_LITE_IMAGE: ghcr.io/sluicesync/sluice-vitess:v24.0.1
        run: |
          go test -tags='integration vitesscluster chaos' -race -count=1 -timeout=120m \
            -run '^TestVitessChaos_' -v ./internal/engines/mysql/...

  # The reshard correctness test: proves the CDC reader follows a
  # VReplication reshard (shard split) without loss or duplication.
  # Its own in-test comments flag any failure as "a sluice CDC-reader
  # correctness bug, NOT a flake" — treat a red leg here as a real
  # bug to file, not a rerun candidate.
  reshard:
    name: Vitess reshard correctness
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'reshard' }}
    runs-on: ubuntu-latest
    # Budgets bumped ~1.5x from the pre-race 65m/75 for the -race
    # overhead (repo-audit 2026-07-03 item 0.4); inner < outer as above.
    timeout-minutes: 110
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The reshard harness hardcodes vitess/lite:latest (vrVitessImage
      # in vitess_cluster_reshard_integration_test.go). Pull the GHCR
      # :latest mirror and retag it locally so testcontainers'
      # PullIfNotPresent finds it without touching docker.io. The
      # sluice-vitess mirror predates the sluice-mirror-* naming rule, so
      # the helper gets the mirror ref explicitly via --mirror; it adds
      # the docker.io ::warning fallback the bare pull+tag lacked.
      - name: Pull the GHCR :latest mirror and retag as vitess/lite:latest
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-mirror-pull.sh \
            --mirror ghcr.io/sluicesync/sluice-vitess:latest vitess/lite:latest

      - name: Run the reshard suite
        run: |
          go test -tags='integration vitessreshard' -race -count=1 -timeout=95m \
            -run '^TestVitessReshard_' -v ./internal/engines/mysql/...

  # The PIPELINE-package vstream suite (Bug-132 chunked parity,
  # restart-mid-copy chaos, sharded-source + Bug-152 collision
  # preflight, write-concurrency, ShapeA consolidation, F7c VStream
  # schema-forward). The required `Integration (vstream)` check in
  # ci.yml runs only the mysql-engine package with -run 'TestVStream_',
  # so these matched neither its package set nor its filter and ran
  # nowhere until this leg existed. They live here (not in the required
  # check) because the set includes a restart-chaos test — observe its
  # reliability across a few weekly cycles before considering promotion
  # into ci.yml's vstream job.
  #
  # The -run filter's third alternative, ^TestStreamer_.*VStream, exists
  # because the F7c schema-forward pin drives the full Streamer apply
  # loop — it is streamer-shaped, not migrate-shaped, so it keeps the
  # pipeline package's TestStreamer_ naming convention rather than
  # taking a misleading TestMigrate_VStream prefix. Any pipeline vstream
  # test must match one of the three alternatives or it silently never
  # runs (enforced by scripts/check-run-filter-coverage.sh in ci.yml's
  # Lint job; keep that script's manifest in sync with this filter).
  vstream-pipeline:
    name: Pipeline vstream suite
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'vstream-pipeline' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to ghcr.io + pre-pull images (bounded retry)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-ghcr-pull.sh \
            ghcr.io/sluicesync/sluice-mysql:8.0-prebaked \
            ghcr.io/sluicesync/sluice-postgres:16-prebaked
      # Via the GHCR mirror with docker.io fallback (task #36) — even
      # bounded-retry docker.io pulls have red-failed jobs on transient
      # "context deadline exceeded" (see the ci.yml vstream job note).
      # The helper retags the mirror back to the stock name locally.
      - name: Pre-pull vttestserver via its GHCR mirror (docker.io fallback)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-mirror-pull.sh vitess/vttestserver:mysql80

      - name: Run the pipeline vstream tests
        run: |
          go test -tags='integration vstream' -race -count=1 -timeout=40m \
            -run '^(TestMigrate_VStream|TestStreamer_.*VStream|TestSpikeShapeA_)' -v ./internal/pipeline/

  # The real-world-schema corpus (roadmap item 52): migrate popular OSS
  # app schemas (GitLab / WordPress / Joomla / MediaWiki / Chinook /
  # Employees / Vitess) through sluice on the deliberate weekly cadence
  # the item intends. The corpus tests ALSO compile in the per-PR
  # pipeline-migrate shard, but the *.sql dumps are fetch-on-demand
  # (gitignored), so there they SKIP — this leg is where they actually
  # run: it fetches the corpus first, then executes it. That includes
  # the item-51 restore-parity oracle over the corpus schemas
  # (TestMigrate_Corpus_DumpParity_*) and the sample-row verify legs
  # (TestMigrate_Corpus_SampleVerify_*).
  #
  # -race because the migrate path the corpus drives is goroutine-bearing
  # (parallel copy); a weekly -race sweep over real schemas is cheap
  # insurance. Non-required (a red run files a bug, never blocks a merge)
  # — the corpus deliberately includes characterization legs (GitLab at
  # 1444 tables) that log rather than hard-assert, and fetch.sh reaches
  # upstream over the network, so a transient fetch flake must not gate
  # merges.
  #
  # The -run filter is scoped by the shared TestMigrate_Corpus_ prefix.
  # These carry only the `integration` tag (no dedicated axis tag), so
  # they are NOT covered by scripts/check-run-filter-coverage.sh — keep
  # every corpus test named TestMigrate_Corpus_* so this filter finds it.
  corpus:
    name: Real-world corpus suite
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'corpus' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to ghcr.io + pre-pull DB images (bounded retry)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-ghcr-pull.sh \
            ghcr.io/sluicesync/sluice-mysql:8.0-prebaked \
            ghcr.io/sluicesync/sluice-postgres:16-prebaked

      # Fetch the corpus dumps (schema-only, data-stripped; gitignored /
      # fetch-on-demand). Provenance + rebuild recipe live in
      # internal/pipeline/testdata/real-world-corpus/{MANIFEST.md,fetch.sh}.
      - name: Fetch the real-world corpus
        run: bash internal/pipeline/testdata/real-world-corpus/fetch.sh

      - name: Run the corpus suite
        run: |
          go test -tags=integration -race -count=1 -timeout=40m \
            -run '^TestMigrate_Corpus_' -v ./internal/pipeline/

  # The AWS-KMS envelope-encryption suite (audit N-17c):
  # backup/restore against a real localstack KMS container + real PG —
  # round-trip (ciphertext chunks, manifest KEK metadata, restore via a
  # fresh kms.Decrypt), chain extension (full + incremental under the
  # same key), and the wrong-key / missing-key loud refusals. Weekly +
  # dispatch: the KMS path only otherwise has unit pins against a
  # stubbed SDK (internal/crypto/aws_kms_test.go), so this is the one
  # place a real Encrypt/Decrypt wire round-trip runs.
  #
  # Any kmsverify-tagged test MUST carry the TestBackup_KMS
  # prefix or the -run filter below silently skips it (enforced by
  # scripts/check-run-filter-coverage.sh in ci.yml's Lint job; keep
  # that script's manifest in sync with this filter).
  kmsverify:
    name: KMS localstack suite
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'all' || github.event.inputs.suite == 'kmsverify' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to ghcr.io + pre-pull the PG image (bounded retry)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-ghcr-pull.sh ghcr.io/sluicesync/sluice-postgres:16-prebaked

      # localstack has no GHCR mirror (yet); pull docker.io directly
      # with a small bounded retry so a transient registry blip doesn't
      # red the leg. Keep the tag in sync with localstackImage in
      # internal/pipeline/backup_kms_localstack_integration_test.go.
      - name: Pre-pull localstack (bounded retry)
        run: |
          for i in 1 2 3; do
            docker pull localstack/localstack:4.0 && break
            echo "pull attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done

      - name: Run the KMS localstack suite
        run: |
          go test -tags='integration kmsverify' -race -count=1 -timeout=25m \
            -run '^TestBackup_KMS' -v ./internal/pipeline/

  # The DDL-fixture harness (internal/translate/ddl_fixture_test.go):
  # sweep the Dolt sqllogictest createtable1 corpus (~4,575 CREATE
  # TABLEs) through a real MySQL 8.0 container and sluice's schema
  # reader, asserting structural invariants per statement. DISPATCH-
  # ONLY (repo-audit 2026-07-03 T-5 gave it this CI entry point —
  # before this leg the suite was runnable but ran nowhere): it is a
  # corpus sweep for schema-reader changes, not a weekly regression
  # signal, and its ~25-30 min wall clock is all fixture grind. It IS
  # included in a dispatched `suite: all` (all means all), but the
  # `github.event_name` guard keeps it off the weekly schedule.
  #
  # No -race: the harness is a single-goroutine DDL apply/read loop,
  # and -race would roughly double an already corpus-bound half hour
  # for no concurrency coverage.
  #
  # Any ddlfixture-tagged test MUST carry the TestDDLFixture prefix or
  # the -run filter below silently skips it (enforced by
  # scripts/check-run-filter-coverage.sh in ci.yml's Lint job).
  ddlfixture:
    name: MySQL DDL-fixture corpus
    if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.suite == 'all' || github.event.inputs.suite == 'ddlfixture') }}
    runs-on: ubuntu-latest
    # The in-test context budget is 30m; the harness's own header asks
    # for -timeout at least 5m larger (deferred summary headroom), and
    # the outer cap stays above the inner per the usual invariant.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The harness boots stock mysql:8.0 via testcontainers; pre-pull
      # it through its GHCR mirror (docker.io fallback) so the boot
      # hits the local cache — same task-#36 pattern as ci.yml.
      - name: Pre-pull mysql:8.0 via its GHCR mirror (docker.io fallback)
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-mirror-pull.sh mysql:8.0

      - name: Run the DDL-fixture corpus
        run: |
          go test -tags='integration ddlfixture' -count=1 -timeout=40m \
            -run '^TestDDLFixture' -v ./internal/translate/...
