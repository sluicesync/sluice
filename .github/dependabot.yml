# Dependabot configuration.
#
# Dependabot is GitHub's built-in dependency-update bot. It watches
# specified package ecosystems and opens pull requests when updates are
# available. Each PR runs through CI, so an update that breaks the build
# is caught immediately.
#
# We watch two ecosystems:
#   - gomod: Go module dependencies in go.mod
#   - github-actions: action versions pinned in .github/workflows/*.yml
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # Go module updates.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Los_Angeles"
    # Cap the number of open update PRs to keep the queue manageable.
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Bundle related package families into single PRs so we get one
    # rollup PR per family per week instead of N independent PRs that
    # cross-conflict on go.sum the moment one of them merges. The
    # aws-sdk-go-v2 family is the worst offender (4-6 sibling packages,
    # all bumping in lockstep upstream). vitess and otel are tracked
    # for the same reason. Anything not in a group still gets its own
    # PR (the default behaviour).
    groups:
      aws-sdk-go-v2:
        patterns:
          - "github.com/aws/aws-sdk-go-v2"
          - "github.com/aws/aws-sdk-go-v2/*"
        update-types:
          - "minor"
          - "patch"
      vitess:
        patterns:
          - "vitess.io/vitess"
          - "vitess.io/vitess/*"
        update-types:
          - "minor"
          - "patch"
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
        update-types:
          - "minor"
          - "patch"
      golang-x:
        patterns:
          - "golang.org/x/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # vitess.io/vitess keeps its Go module at v0.x ON PURPOSE (its real
      # releases are v19/v24/etc.; the module stays v0 to avoid the /vN
      # path). Dependabot misreads a stray v2.x tag as a major bump (e.g.
      # 2.1.1+incompatible) that does not build. The vitess group above
      # tracks legit v0.x minor/patch; this ignores the bogus major bumps.
      - dependency-name: "vitess.io/vitess"
        update-types: ["version-update:semver-major"]

  # GitHub Actions updates. Keeps the actions/checkout@v4-style references
  # current so we benefit from upstream fixes and security patches.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    # Bundle the docker/* official actions into one rollup PR. They bump
    # in lockstep upstream and live in the same workflow files
    # (build-prebaked-images.yml / release.yml), so as independent PRs
    # they cross-conflict on those files the moment one of them merges —
    # the same go.sum-style churn the gomod groups above exist to avoid.
    groups:
      docker-actions:
        patterns:
          - "docker/*"
        update-types:
          - "minor"
          - "patch"
