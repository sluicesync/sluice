<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="sluice">
  <!-- Single-ink gate glyph on transparent (semi-final: hard-edge structure,
       connected T-handle, rounded water). Recolor fill/stroke for dark mode,
       print, or favicons. Default ink #F35815. -->
  <g fill="#F35815">
    <!-- channel walls (square) -->
    <rect x="33" y="30" width="9" height="68"/>
    <rect x="86" y="30" width="9" height="68"/>
    <!-- raised gate paddle (square) -->
    <rect x="41" y="42" width="46" height="12"/>
    <!-- connected T-handle -->
    <rect x="49" y="17" width="30" height="7"/>
    <rect x="61" y="20" width="6" height="23"/>
    <!-- regulated flow (rounded) -->
    <rect x="47" y="66" width="34" height="7" rx="3.5" opacity="0.72"/>
    <rect x="51" y="78" width="26" height="7" rx="3.5" opacity="0.72"/>
    <rect x="55" y="90" width="16" height="7" rx="3.5" opacity="0.72"/>
  </g>
</svg>
