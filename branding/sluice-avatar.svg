<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="sluice">
  <!-- Avatar variant: FULL-BLEED #F35815 (no inset/rounded corners) so GitHub's
       own avatar-rounding trims orange, not a clipped light border. Gate art is
       identical to sluice-mark.svg. -->
  <rect x="0" y="0" width="128" height="128" fill="#F35815"/>

  <!-- channel walls (square) -->
  <rect x="37" y="36" width="8" height="60" fill="#FFFFFF"/>
  <rect x="83" y="36" width="8" height="60" fill="#FFFFFF"/>

  <!-- raised gate paddle (square) -->
  <rect x="44" y="46" width="40" height="11" fill="#FFFFFF"/>

  <!-- connected T-handle: bar + stem -->
  <rect x="52" y="20" width="24" height="6" fill="#FFFFFF"/>
  <rect x="61.5" y="23" width="5" height="24" fill="#FFFFFF"/>

  <!-- regulated flow underneath (rounded) -->
  <rect x="49" y="68" width="30" height="6" rx="3" fill="#FFDCC6"/>
  <rect x="53" y="79" width="22" height="6" rx="3" fill="#FFDCC6"/>
  <rect x="57" y="90" width="14" height="6" rx="3" fill="#FFDCC6"/>
</svg>
